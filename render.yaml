# نشر باك إند Django (مركز عبور) على Render
# الاستخدام: Render Dashboard → New → Blueprint → اربط هذا الريبو
# الأسرار (sync:false) تُدخَل يدوياً في لوحة Render بعد الإنشاء.
services:
  - type: web
    name: oboor-backend
    runtime: python
    plan: free
    rootDir: backend
    region: frankfurt
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput"
    startCommand: "gunicorn config.wsgi:application"
    healthCheckPath: /admin/login/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://oobor.vercel.app,https://oboor.vercel.app,https://*.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://oobor.vercel.app,https://oboor.vercel.app,http://localhost:3000"
      - key: SUPABASE_S3_BUCKET
        value: "media"
      # ===== أسرار: أدخلها في لوحة Render (Environment) =====
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_S3_KEY
        sync: false
      - key: SUPABASE_S3_SECRET
        sync: false
      - key: SUPABASE_S3_ENDPOINT
        sync: false
