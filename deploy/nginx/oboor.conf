# إعداد nginx للسيرفر (reverse proxy لتطبيق عبور).
# المسار على السيرفر: /etc/nginx/sites-available/oboor.conf (مربوط في sites-enabled).
#
# البنية: Cloudflare (ينهّي TLS على الحافة) → nginx:80 → الحاويات على 127.0.0.1.
# الحاويات (3000/8000/9000) مربوطة على loopback فقط وغير منشورة للعامة.

server {
    listen 80;
    listen [::]:80;
    server_name oboor.ido.sa;

    client_max_body_size 15M;   # رفع السير الذاتية حتى 10 ميجا

    # واجهة Django (كل المسارات تحت /api/ + لوحة الـCMS API)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;   # Cloudflare ينهّي TLS
    }

    # ملفات Django الثابتة (لوحة الإدارة)
    location /static/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # الصور والملفات المرفوعة → MinIO
    location /media/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
    }

    # كل شيء آخر → واجهة Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
